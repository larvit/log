name: Push
on: [push]
jobs:
  Build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ["18", "20", "22", "24", "26"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      # Deps + build + test all run inside the container, so this matches `npm run test-docker` locally.
      - name: Test (Node ${{ matrix.node-version }}, in Docker)
        run: npm run test-docker
        env:
          NODE_IMAGE: node:${{ matrix.node-version }}-bookworm-slim

  Browser-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      # Same suite in real Chromium via the official Playwright Docker image.
      - run: npm run test-browser

  OTLP-test:
    runs-on: ubuntu-24.04
    # End-to-end check: export to a real (pinned) OpenTelemetry Collector and assert it parsed both
    # our JSON and protobuf output. index.js is built in Docker (deps in the container), so the host
    # needs only Docker plus Node to run the driver — no `npm ci`.
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm run test-otlp

  Lint:
    runs-on: ubuntu-24.04
    # eslint 10 / eslint-plugin-perfectionist need Node 20+; lint is static, so run it once
    # here instead of inside every test-matrix node (Node 18 can't run the linter).
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run lint
